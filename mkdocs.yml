site_name: Tiaki News
site_url: https://tiaki.pages.dev


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences


theme:
  name: material

  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    accent: blue

  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    accent: blue

  font:
    text: Ubuntu

  features:
    # nav features
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - toc.follow

nav:
  - Home: index.md
  - Articles:
      - Greece's Population Problem: greece/index.md
      - Manaus and its Environment: manaus/index.md
      - Paul Kagame's Rwanda: rwanda/index.md


extra_css:
  - assets/stylesheets/extra.css
